{{ $item := .item }}

<div class="img-list-item news-list-item row mt-5">
  <div class="col-12 col-md-4 mb-3">
    <img src="{{ $item.lead_image | relURL }}" alt="{{ $item.title | markdownify | safeHTML}}" class="img-fluid rounded-start">
  </div>
  <div class="col-12 col-md-8" style="text-align: justify;">
    {{ $item.summary | markdownify | emojify }}
  </div>
</div>
